<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div id="app">
		<div class="vid-container">
			<video class="video-container" loop></video>
		</div>
		
		<div class="player-container">
			<audio class="song"></audio>
		</div>
		
		<div class="sound-picker">
			<button data-sound="rain.mp3" data-video="rain.mp4">rain</button>
			<button data-sound="beach.mp3" data-video="beach.mp4">beach</button>
		</div>

		<div id="time-select">
			<button id="smaller-mins">2 min</button>
			<button id="medium-mins">5 min</button>
			<button id="long-mins">10 min</button>
		</div>
		
		<button class="play">play/pause</button>
		<p class="time-display">10:0</p>
		
	</div>
	
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
